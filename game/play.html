<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Старые танки</title>
<style>
html,body{margin:0;width:100%;height:100%;background:#111;overflow:hidden}
iframe{display:block;width:100%;height:100%;border:0;background:#111}
</style>
</head>
<body>
<iframe id="gameFrame" src="index.html" title="Старые танки"></iframe>
<script>
const frame=document.getElementById('gameFrame');
frame.addEventListener('load',()=>{
  const doc=frame.contentDocument;
  const script=doc.createElement('script');
  script.src='fixes.js?v=2';
  script.onerror=()=>console.error('Не удалось загрузить fixes.js');
  doc.body.appendChild(script);
});
</script>
</body>
</html>
